services:
  - type: web
    name: roomchat
    runtime: node
    plan: free
    branch: main
    healthCheckPath: /
    buildCommand: npm install --include=dev && npm run build
    startCommand: node build
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: roomchat-db
          property: connectionString
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: ORIGIN
        sync: false
      - key: NODE_ENV
        value: production
      - key: COOKIE_SECRET
        generateValue: true
      - key: DB_SSL_MODE
        value: no-verify

databases:
  - name: roomchat-db
    plan: free
